# PostgreSQL and OpenLDAP services for running the container-backed integration
# test suite.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   TEST_DATABASE_HOST=127.0.0.1 TEST_DATABASE_PORT=15432 \
#   TEST_DATABASE_USER=toughradius TEST_DATABASE_PASSWORD=toughradius \
#   TEST_DATABASE_NAME=postgres \
#   TEST_LDAP_URL=ldap://127.0.0.1:1389 \
#   TEST_LDAP_BASE_DN=dc=example,dc=org \
#   TEST_LDAP_USER_FILTER='(cn=%s)' \
#   TEST_LDAP_BIND_DN_TEMPLATE='cn=%s,ou=users,dc=example,dc=org' \
#   TEST_LDAP_ADMIN_DN=cn=admin,dc=example,dc=org \
#   TEST_LDAP_ADMIN_PASSWORD=adminpassword \
#   TEST_LDAP_USER=alice TEST_LDAP_PASSWORD=alice-password \
#   go test -tags=integration ./test/integration/...
#   docker compose -f docker-compose.test.yml down -v
#
# The `make test-integration-pg` target automates the full lifecycle.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: toughradius
      POSTGRES_PASSWORD: toughradius
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toughradius -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  openldap:
    image: bitnamilegacy/openldap:2.6
    environment:
      LDAP_ROOT: dc=example,dc=org
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
      LDAP_USERS: alice,bob
      LDAP_PASSWORDS: alice-password,bob-password
    ports:
      - "1389:1389"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ldapsearch -x -H ldap://127.0.0.1:1389 -b dc=example,dc=org -D cn=admin,dc=example,dc=org -w adminpassword >/dev/null",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
