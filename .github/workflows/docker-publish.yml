name: toughradius docker build and publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Extract version from tag
        id: version
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push to Docker Hub
        id: dockerhub_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            talkincode/toughradius:latest
            talkincode/toughradius:${{ steps.version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to GitHub Container Registry
        id: ghcr_login
        continue-on-error: true
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ secrets.PKG_GITHUB_USERNAME || secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.PKG_GITHUB_TOKEN || secrets.GHCR_TOKEN || github.token }}

      - name: Build image and push to GitHub Container Registry
        id: ghcr_build
        if: steps.ghcr_login.outcome == 'success'
        continue-on-error: true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/${{ github.repository_owner }}/toughradius:latest
            ghcr.io/${{ github.repository_owner }}/toughradius:${{ steps.version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize image publish result
        if: always()
        shell: bash
        run: |
          {
            echo "## Docker image publish"
            echo ""
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Docker Hub: \`${{ steps.dockerhub_build.outcome }}\`"
            echo "- Docker Hub digest: \`${{ steps.dockerhub_build.outputs.digest }}\`"
            echo "- GHCR login: \`${{ steps.ghcr_login.outcome }}\`"
            echo "- GHCR: \`${{ steps.ghcr_build.outcome }}\`"
            if [ -n "${{ steps.ghcr_build.outputs.digest }}" ]; then
              echo "- GHCR digest: \`${{ steps.ghcr_build.outputs.digest }}\`"
            fi
            echo ""
            echo "Docker Hub publishing is required. GHCR publishing depends on the"
            echo "package repository access / inherited access settings, or on optional"
            echo "\`PKG_GITHUB_TOKEN\` and optional \`PKG_GITHUB_USERNAME\` secrets with package write access."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.ghcr_login.outcome }}" != "success" ] || [ "${{ steps.ghcr_build.outcome }}" != "success" ]; then
            echo "::warning title=GHCR publish did not complete::Docker Hub publish completed, but GHCR publish needs package repository access or a PKG_GITHUB_TOKEN with write:packages. See issue #503 runbook notes before rerunning the tag workflow."
          fi
