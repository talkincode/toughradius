name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'
  CGO_ENABLED: 0

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: ./web
        run: |
          npm ci
          npm run build

      # Build the frontend once and share web/dist with every Go job so they
      # don't each repeat npm ci + npm run build. The Go jobs only need these
      # files present for the web/static.go `go:embed dist/*` directive.
      - name: Upload frontend build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
          include-hidden-files: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          args: --timeout=5m
          # setup-go already provides the Go module/build cache (and only
          # re-uploads it when go.sum changes). The action's own cache stores
          # the go-build cache too, which changes on every run and therefore
          # re-uploads ~70MB during "Post job cleanup" each time. Restore it for
          # a faster lint run, but skip the slow save to keep CI snappy.
          skip-save-cache: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -short -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  integration:
    name: Integration (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toughradius
          POSTGRES_PASSWORD: toughradius
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U toughradius -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run PostgreSQL integration tests
        env:
          TEST_DATABASE_HOST: 127.0.0.1
          TEST_DATABASE_PORT: '15432'
          TEST_DATABASE_USER: toughradius
          TEST_DATABASE_PASSWORD: toughradius
          TEST_DATABASE_NAME: postgres
          INTEGRATION_REQUIRED: '1'
        run: go test -tags=integration -count=1 -v ./test/integration/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [frontend, lint, test]
    timeout-minutes: 45
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "develop")
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          GIT_COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="toughradius"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="toughradius.exe"
          fi
          
          go build -ldflags "-s -w \
            -X main.Version=${{ steps.version.outputs.version }} \
            -X main.BuildTime=${{ steps.version.outputs.build_time }} \
            -X main.GitCommit=${{ steps.version.outputs.git_commit }}" \
            -o "dist/${BINARY_NAME}" main.go
          
          echo "✅ Built ${{ matrix.goos }}/${{ matrix.goarch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: toughradius-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Run govulncheck
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          args: --enable-only=gosec --timeout=5m
          # See the Lint job: skip the redundant ~70MB go-build cache upload
          # that runs during "Post job cleanup" on every run.
          skip-save-cache: true
        continue-on-error: ${{ github.event_name == 'pull_request' }}

  docs:
    name: Docs (mdbook)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Pin the mdBook version to match what contributors run locally so a build
      # that passes locally also passes here (and vice versa).
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2
        with:
          mdbook-version: '0.5.3'

      - name: Build handbook
        run: mdbook build docs-site

      - name: Install lychee
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: lychee

      # Offline link check over the generated HTML: a build failure or a broken
      # internal link fails the pipeline. --offline skips http(s) links so the
      # gate never flakes on network conditions; --root-dir lets the generated
      # 404 page's root-relative links resolve.
      - name: Check links (offline)
        run: lychee --offline --no-progress --root-dir "$PWD/docs-site/book" 'docs-site/book/**/*.html'
