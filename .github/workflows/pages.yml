name: Deploy Pages (mdbook handbook)

# Publishes the bilingual mdBook handbook under docs-site/ to GitHub Pages.
#
# The repository's Pages source must be set to "GitHub Actions" (the REST API
# reports this as build_type: workflow). The build writes a CNAME file into the
# published artifact, so GitHub Pages serves the handbook at the custom domain
# https://www.toughradius.net/ (the default talkincode.github.io/toughradius URL
# keeps working and redirects to it). For that domain to resolve, its DNS must
# point at GitHub Pages: A records 185.199.108.153-185.199.111.153, or a DNS-only
# CNAME to talkincode.github.io. See docs-site/src/en/gitbook-coexistence.md.

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege scopes required by actions/deploy-pages (OIDC deployment).
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments. Let an in-progress publish finish so a half-built site
# is never served, while superseded queued runs are skipped.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build handbook
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Pin mdBook to the same version as the CI docs gate and local builds so a
      # build that passes there also passes here.
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.3'

      - name: Build handbook
        run: mdbook build docs-site

      # Attach the custom domain to the deploy. GitHub Pages reads a CNAME file at
      # the published site root and sets the repository's Pages custom domain to
      # it on every release, so the handbook is served at https://www.toughradius.net/.
      - name: Set custom domain (CNAME)
        run: echo 'www.toughradius.net' > docs-site/book/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
