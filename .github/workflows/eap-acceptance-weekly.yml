name: EAP Acceptance Weekly

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: eap-acceptance-weekly-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25"
  CGO_ENABLED: 0

jobs:
  eap-acceptance:
    name: External EAP acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toughradius
          POSTGRES_PASSWORD: toughradius
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U toughradius -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Install eapol_test
        run: |
          sudo apt-get update
          sudo apt-get install -y eapoltest

      - name: Download dependencies
        run: go mod download

      - name: Run external EAP acceptance tests
        id: eap_test
        continue-on-error: true
        env:
          TEST_DATABASE_HOST: 127.0.0.1
          TEST_DATABASE_PORT: "15432"
          TEST_DATABASE_USER: toughradius
          TEST_DATABASE_PASSWORD: toughradius
          TEST_DATABASE_NAME: postgres
          INTEGRATION_REQUIRED: "1"
          EAP_ACCEPTANCE_REQUIRED: "1"
          EAP_ACCEPTANCE_RESULT_JSON: ${{ github.workspace }}/build/eap-acceptance/eap-acceptance.json
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/eap-acceptance
          go test -tags="integration eap_accept" -count=1 -run TestEAPExternalAcceptance -v ./test/integration/... 2>&1 | tee build/eap-acceptance/go-test.log

      - name: Generate Markdown report
        if: always()
        shell: bash
        run: |
          if [ ! -f build/eap-acceptance/eap-acceptance.json ]; then
            cat > build/eap-acceptance/eap-acceptance.json <<'JSON'
          {
            "verdict": "failed",
            "scenarios": [
              {
                "id": "missing-result-json",
                "name": "External EAP acceptance result JSON",
                "method": "tooling",
                "expected": "result JSON exists",
                "status": "failed",
                "detail": "The Go acceptance test did not produce its result JSON."
              }
            ]
          }
          JSON
          fi
          go run ./scripts/eap_acceptance_report.go \
            -input build/eap-acceptance/eap-acceptance.json \
            -report-dir docs/reports/eap \
            -docs-site-src docs-site/src \
            -date "$(date -u +%F)" \
            -retention 3

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: eap-acceptance-${{ github.run_id }}
          path: |
            build/eap-acceptance/
            docs/reports/eap/latest.md
          retention-days: 30
          include-hidden-files: true

      - name: Open report PR
        if: steps.eap_test.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          EAP_REPORT_SIGNING_KEY: ${{ secrets.EAP_REPORT_SIGNING_KEY }}
          EAP_REPORT_SIGNING_NAME: ${{ vars.EAP_REPORT_SIGNING_NAME || 'toughradius-automation' }}
          EAP_REPORT_SIGNING_EMAIL: ${{ vars.EAP_REPORT_SIGNING_EMAIL }}
        shell: bash
        run: |
          if git diff --quiet -- docs/reports/eap docs-site/src/en/eap-acceptance-reports.md docs-site/src/zh/eap-acceptance-reports.md; then
            echo "No report changes to publish."
            exit 0
          fi

          if [ -z "${EAP_REPORT_SIGNING_KEY:-}" ] || [ -z "${EAP_REPORT_SIGNING_EMAIL:-}" ]; then
            echo "::error::EAP_REPORT_SIGNING_KEY secret and EAP_REPORT_SIGNING_EMAIL variable are required because main requires signed commits."
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"
          signing_key="$HOME/.ssh/eap_report_signing_key"
          printf '%s\n' "$EAP_REPORT_SIGNING_KEY" > "$signing_key"
          chmod 600 "$signing_key"

          branch="automation/eap-acceptance-report-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "$EAP_REPORT_SIGNING_NAME"
          git config user.email "$EAP_REPORT_SIGNING_EMAIL"
          git config gpg.format ssh
          git config user.signingkey "$signing_key"
          git config commit.gpgsign true
          git switch -c "$branch"
          git add docs/reports/eap docs-site/src/en/eap-acceptance-reports.md docs-site/src/zh/eap-acceptance-reports.md
          git commit -S -m "docs: update EAP acceptance report"
          git push --force-with-lease origin "$branch"

          commit_sha="$(git rev-parse HEAD)"
          verified=false
          for _ in 1 2 3 4 5; do
            verified="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${commit_sha}" --jq '.commit.verification.verified')"
            if [ "$verified" = "true" ]; then
              break
            fi
            sleep 3
          done
          if [ "$verified" != "true" ]; then
            echo "::error::Generated report commit ${commit_sha} was not verified by GitHub; refusing to open an unmergeable PR."
            exit 1
          fi

          result_json="build/eap-acceptance/eap-acceptance.json"
          report_date="$(date -u +%F)"
          verdict="$(jq -r '.verdict // "unknown"' "$result_json")"
          total="$(jq '[.scenarios[]?] | length' "$result_json")"
          passed="$(jq '[.scenarios[]? | select(.status == "passed")] | length' "$result_json")"
          failed="$(jq '[.scenarios[]? | select(.status == "failed")] | length' "$result_json")"
          skipped="$(jq '[.scenarios[]? | select(.status == "skipped")] | length' "$result_json")"
          pr_body="$(mktemp)"
          cat > "$pr_body" <<EOF
          ## Summary

          Updates the weekly external EAP acceptance report for ${report_date}.

          ## Acceptance Snapshot

          - Verdict: ${verdict}
          - Scenarios: ${passed} passed, ${failed} failed, ${skipped} skipped, ${total} total
          - Source ref: ${GITHUB_REF_NAME}
          - Source commit: ${GITHUB_SHA}

          ## Published Files

          - docs/reports/eap/${report_date}.md
          - docs/reports/eap/latest.md
          - docs-site/src/en/eap-acceptance-reports.md
          - docs-site/src/zh/eap-acceptance-reports.md

          ## Workflow Run

          ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ## 中文摘要

          更新 ${report_date} 的每周外部 EAP 验收测试报告。

          - 验收结论：${verdict}
          - 场景统计：通过 ${passed}，失败 ${failed}，跳过 ${skipped}，总计 ${total}
          - 工作流链接：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          gh pr create \
            --base main \
            --head "$branch" \
            --title "docs: update weekly EAP acceptance report (${report_date}, ${verdict})" \
            --body-file "$pr_body"

      - name: Fail if acceptance failed
        if: steps.eap_test.outcome != 'success'
        run: exit 1
